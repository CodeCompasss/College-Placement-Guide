site_name: College-Placement-Guide
site_description: College Placement Guide helps students navigate campus placements with confidence. From aptitude and coding practice to interview prep and resume guidance, this repo is your one-stop solution for placement success. 
site_author: SHADIL A M
site_url: https://codecompasss.github.io/College-Placement-Guide/

# Repository
repo_name: College-Placement-Guide
repo_url: https://github.com/CodeCompasss/College-Placement-Guide
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

  font:
    text: Inter
    code: JetBrains Mono

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to system preference
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_if_directory_urls: true
      type: datetime
  - git-authors:
      show_email: false
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shadil-rayyan
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/shadilrayyan
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/shadilam

  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation.

  analytics:
    provider: google
    property: G-XXXXXXXXXX

    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve this page using our
            <a href="..." target="_blank" rel="noopener">feedback form</a>.

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
nav:
  - Home: index.md

  - Getting Started:
      - Company Research: job-search/company-research.md
      - Job Portals: job-search/job-portals.md

  - Build Your Profile:
      - Resume Guide: resume-profile/resume-guide.md
      - LinkedIn Profile Setup: resume-profile/linkedin-profile-setup.md
      - Cold Emailing: resume-profile/cold-emailing.md
      - Cover Letter: resume-profile/cover-letter.md

  - Find Opportunities:
      - Email Alerts: alerts/email-alert-setup.md
      - LinkedIn Alerts: alerts/linkedin-alerts-guide.md
      - RSS Job Tracking: alerts/rss-job-tracking.md
      - Referral Guide: referrals.md

  - Prepare for Coding:
      - DSA Mastery: resume-profile/dsa.md
      - Aptitude Preparation: resume-profile/aptitude.md

  - Ace the Interview:
      - Interview Process: interview-prep/interview-rounds.md
      - Group Discussions: interview-prep/gd-preparation.md
      - HR Interview: interview-prep/hr-round-guide.md
      - Soft Skills: resume-profile/soft-skills.md

  - Evaluate Your Offer:
      - Compensation Comparison: salary/compensation-comparison.md
      - Negotiation Guide: salary/negotiation-guide.md
      - Offer Evaluation: salary/offer-evaluation.md

  - Resources:
      - WhatsApp Communities: resource/whatsapp.md
      - LinkedIn: resource/linkdln.md
      - YouTube Channels: resource/youtube.md
